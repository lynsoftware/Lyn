name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'Lyn.Backend/**'
      - 'Lyn.Shared/**'
      - 'docker-compose.ec2.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/lynsoftware/lyn-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test Lyn.Tests/Lyn.Tests.csproj --configuration Release --verbosity normal

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bygger backend-imaget i Actions (ikke pa EC2) og pusher privat til GHCR.
      # Build-context er repo-rota; Dockerfile ligger i Lyn.Backend/.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Lyn.Backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get EC2 Instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=lyn-backend-server" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region eu-north-1)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Found instance: $INSTANCE_ID"

      # EC2 trekker ferdig image fra GHCR (ingen build pa instansen).
      # Forutsetning: EC2 er logget inn pa ghcr.io (engangs: sudo -u ubuntu docker login ghcr.io).
      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ steps.get-instance.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo -u ubuntu git -C /home/ubuntu/Lyn fetch origin",
              "sudo -u ubuntu git -C /home/ubuntu/Lyn reset --hard origin/main",
              "cd /home/ubuntu/Lyn",
              "sudo -u ubuntu docker compose -f docker-compose.ec2.yml pull",
              "sudo -u ubuntu docker compose -f docker-compose.ec2.yml up -d",
              "sudo -u ubuntu docker image prune -f",
              "echo Deployment completed"
            ]' \
            --region eu-north-1 \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"

          # Poll til kommandoen er ferdig
          for i in {1..30}; do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ steps.get-instance.outputs.instance_id }} \
              --region eu-north-1 \
              --query "Status" \
              --output text)
            echo "Status ($i): $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
          done
